kind = "web"
previewPath = "/"
title = "Reflection – Portfolio & AI Zen Coach"
version = "1.0.0"
id = "artifacts/reflection"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26064

[services.development]
run = "pnpm --filter @workspace/reflection run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/reflection", "run", "build" ]
publicDir = "artifacts/reflection/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26064"
BASE_PATH = "/"
